<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Directorio Empresarial</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-50">
  <!-- Header -->
  <header class="bg-blue-600 text-white shadow-lg">
    <div class="container mx-auto px-4 py-6">
      <h1 class="text-3xl font-bold">📁 Directorio Empresarial</h1>
      <p class="text-blue-100 mt-1">Sistema de gestión de empresas</p>
    </div>
  </header>

  <!-- Main Container -->
  <main class="container mx-auto px-4 py-8">
    
    <!-- Vista: Listado de Empresas -->
    <div id="vistaListado">
      <!-- Barra de acciones -->
      <div class="bg-white rounded-lg shadow-md p-6 mb-6">
        <div class="flex flex-col lg:flex-row gap-4 items-start lg:items-center justify-between mb-4">
          <div class="flex-1 w-full lg:w-auto">
            <input 
              type="text" 
              id="searchInput" 
              placeholder="🔍 Buscar por nombre, contacto, sector, comarca o dinamizador..." 
              class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
            >
          </div>
          <button 
            id="btnNuevaEmpresa" 
            class="bg-green-600 hover:bg-green-700 text-white px-6 py-2 rounded-lg font-semibold transition whitespace-nowrap"
          >
            ➕ Añadir Empresa
          </button>
        </div>

        <!-- Filtros -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Sector</label>
            <select id="filtroSector" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500">
              <option value="">Todos los sectores</option>
            </select>
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Comarca</label>
            <select id="filtroComarca" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500">
              <option value="">Todas las comarcas</option>
            </select>
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Dinamizador</label>
            <select id="filtroDinamizador" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500">
              <option value="">Todos los dinamizadores</option>
            </select>
          </div>
        </div>

        <!-- Contador y Exportar -->
        <div class="flex justify-between items-center mt-4 pt-4 border-t">
          <p id="resultadosInfo" class="text-gray-600 font-medium"></p>
          <button 
            id="btnExportarCSV" 
            class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg font-semibold transition"
          >
            📥 Exportar CSV
          </button>
        </div>
      </div>

      <!-- Tabla de empresas -->
      <div class="bg-white rounded-lg shadow-md overflow-hidden">
        <div class="overflow-x-auto">
          <table class="w-full">
            <thead class="bg-gray-100 border-b">
              <tr>
                <th class="px-4 py-3 text-left text-sm font-semibold text-gray-700">Empresa</th>
                <th class="px-4 py-3 text-left text-sm font-semibold text-gray-700">Sector</th>
                <th class="px-4 py-3 text-left text-sm font-semibold text-gray-700">Comarca</th>
                <th class="px-4 py-3 text-left text-sm font-semibold text-gray-700">Contacto</th>
                <th class="px-4 py-3 text-left text-sm font-semibold text-gray-700">Dinamizador</th>
                <th class="px-4 py-3 text-center text-sm font-semibold text-gray-700">Acciones</th>
              </tr>
            </thead>
            <tbody id="tablaEmpresas">
              <!-- Las filas se cargan dinámicamente -->
            </tbody>
          </table>
        </div>

        <!-- Paginación -->
        <div id="paginacion" class="bg-gray-50 px-4 py-3 border-t flex items-center justify-between">
          <button id="btnAnterior" class="px-4 py-2 bg-white border rounded-lg hover:bg-gray-100 disabled:opacity-50 disabled:cursor-not-allowed">
            ← Anterior
          </button>
          <span id="infoPagina" class="text-gray-600"></span>
          <button id="btnSiguiente" class="px-4 py-2 bg-white border rounded-lg hover:bg-gray-100 disabled:opacity-50 disabled:cursor-not-allowed">
            Siguiente →
          </button>
        </div>
      </div>
    </div>

    <!-- Vista: Detalle de Empresa -->
    <div id="vistaDetalle" class="hidden">
      <button id="btnVolverDetalle" class="mb-4 text-blue-600 hover:text-blue-800 font-semibold">
        ← Volver al listado
      </button>
      
      <div class="bg-white rounded-lg shadow-md p-8">
        <div class="flex justify-between items-start mb-6">
          <h2 id="detalleNombreEmpresa" class="text-2xl font-bold text-gray-800"></h2>
          <div class="flex gap-2">
            <button id="btnEditarDetalle" class="bg-yellow-500 hover:bg-yellow-600 text-white px-4 py-2 rounded-lg font-semibold">
              ✏️ Editar
            </button>
            <button id="btnEliminarDetalle" class="bg-red-600 hover:bg-red-700 text-white px-4 py-2 rounded-lg font-semibold">
              🗑️ Eliminar
            </button>
          </div>
        </div>

        <div id="detalleContenido" class="grid grid-cols-1 md:grid-cols-2 gap-6">
          <!-- Se carga dinámicamente -->
        </div>
      </div>
    </div>

    <!-- Vista: Formulario Alta/Edición -->
    <div id="vistaFormulario" class="hidden">
      <button id="btnVolverFormulario" class="mb-4 text-blue-600 hover:text-blue-800 font-semibold">
        ← Volver al listado
      </button>
      
      <div class="bg-white rounded-lg shadow-md p-8">
        <h2 id="tituloFormulario" class="text-2xl font-bold text-gray-800 mb-6"></h2>
        
        <form id="formularioEmpresa" class="space-y-6">
          <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            
            <!-- Nombre Empresa -->
            <div class="md:col-span-2">
              <label class="block text-sm font-medium text-gray-700 mb-1">
                Nombre de Empresa <span class="text-red-500">*</span>
              </label>
              <input 
                type="text" 
                id="inputNombreEmpresa" 
                required
                class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500"
              >
            </div>

            <!-- Sector -->
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">Sector</label>
              <input 
                type="text" 
                id="inputSector" 
                list="listaSectores"
                class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500"
              >
              <datalist id="listaSectores"></datalist>
            </div>

            <!-- Comarca -->
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">Comarca</label>
              <input 
                type="text" 
                id="inputComarca" 
                list="listaComarcas"
                class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500"
              >
              <datalist id="listaComarcas"></datalist>
            </div>

            <!-- Correo Electrónico -->
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">Correo Electrónico</label>
              <input 
                type="email" 
                id="inputCorreo" 
                class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500"
              >
            </div>

            <!-- Teléfono -->
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">Teléfono</label>
              <input 
                type="tel" 
                id="inputTelefono" 
                class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500"
              >
            </div>

            <!-- Persona de Contacto -->
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">Persona de Contacto</label>
              <input 
                type="text" 
                id="inputPersonaContacto" 
                class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500"
              >
            </div>

            <!-- Cargo -->
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">Cargo</label>
              <input 
                type="text" 
                id="inputCargo" 
                class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500"
              >
            </div>

            <!-- Página Web -->
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">Página Web</label>
              <input 
                type="url" 
                id="inputPaginaWeb" 
                placeholder="https://"
                class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500"
              >
            </div>

            <!-- Dinamizador -->
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">Dinamizador</label>
              <input 
                type="text" 
                id="inputDinamizador" 
                list="listaDinamizadores"
                class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500"
              >
              <datalist id="listaDinamizadores"></datalist>
            </div>
          </div>

          <!-- Botones del formulario -->
          <div class="flex gap-4 pt-4">
            <button 
              type="submit" 
              class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded-lg font-semibold"
            >
              💾 Guardar
            </button>
            <button 
              type="button" 
              id="btnCancelarFormulario"
              class="bg-gray-400 hover:bg-gray-500 text-white px-6 py-2 rounded-lg font-semibold"
            >
              ✖️ Cancelar
            </button>
          </div>
        </form>
      </div>
    </div>

  </main>

  <!-- Modal de confirmación -->
  <div id="modalConfirmacion" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
    <div class="bg-white rounded-lg p-6 max-w-md w-full mx-4">
      <h3 class="text-xl font-bold text-gray-800 mb-4" id="modalTitulo"></h3>
      <p class="text-gray-600 mb-6" id="modalMensaje"></p>
      <div class="flex gap-4">
        <button id="btnConfirmar" class="flex-1 bg-red-600 hover:bg-red-700 text-white px-4 py-2 rounded-lg font-semibold">
          Confirmar
        </button>
        <button id="btnCancelarModal" class="flex-1 bg-gray-400 hover:bg-gray-500 text-white px-4 py-2 rounded-lg font-semibold">
          Cancelar
        </button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
